<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Solo para ti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght=600;700&family=Poppins:wght=300;400&display=swap" rel="stylesheet">
<style>

  :root{
    --glow-gold:#ffd873;
    --glow-amber:#ffb347;
    --pink-neon:#ff6fb0;
    --pink-soft:#ffe1f0;
    --tulip-pink:#ff5d8f;
    --leaf-green:#49b46b;
    --bg-deep:#05040c;
    --bg-mid:#0e0f27;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    width:100%;
    height: 100vh; 
    overflow:hidden;
    background:radial-gradient(ellipse at 50% 30%, var(--bg-mid) 0%, var(--bg-deep) 70%);
    font-family:'Poppins',sans-serif;
  }

  canvas#stars{position:fixed;inset:0;z-index:0;pointer-events:none;}

  .portal-wrap{
    position:fixed;left:50%;top:58%;
    transform:translate(-50%,-50%);
    width:min(70vw,320px);height:min(70vw,320px);
    z-index:1;
  }
  
  .ring-glow{
    position:absolute;inset:-10%;border-radius:50%;
    background:radial-gradient(ellipse 100% 45% at 50% 50%,
                rgba(255,216,120,0.85) 0%,
                rgba(255,179,71,0.45) 35%,
                rgba(255,179,71,0) 72%);
    filter:blur(4px);
  }

  .planet-dome{
    position:absolute;inset:0;border-radius:50%;
    background:
      radial-gradient(circle at 20% 60%, rgba(255,255,255,.18) 0 1px, transparent 1.2px),
      radial-gradient(circle at 60% 38%, rgba(255,255,255,.15) 0 1px, transparent 1.2px),
      radial-gradient(circle at 75% 68%, rgba(255,255,255,.13) 0 1px, transparent 1.2px),
      radial-gradient(circle at 40% 80%, rgba(255,255,255,.12) 0 1px, transparent 1.2px),
      radial-gradient(circle at 32% 28%, #201c3c, #05040a 72%);
    background-size:38px 38px,52px 52px,60px 60px,46px 46px,cover;
    box-shadow:0 20px 50px rgba(0,0,0,0.85);
    animation: twinkling_planet 2.5s ease-in-out infinite;
  }
  
  @keyframes twinkling_planet {
    0%, 100% { box-shadow: 0 20px 50px rgba(0,0,0,0.85), 0 0 15px rgba(255,216,120,0.4); }
    50% { box-shadow: 0 20px 50px rgba(0,0,0,0.85), 0 0 40px rgba(255,216,120,0.85); }
  }

  .orbit-container {
    position:absolute;
    inset:0;
    z-index:2;
    animation: orbit-spin 25s linear infinite;
  }

  .satellite-holder {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(var(--angle)) translateY(-135%) rotate(calc(-1 * var(--angle)));
    width: min(24vw, 100px);
    height: min(24vw, 100px);
  }

  .foto-satelite {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255, 232, 196, 0.9);
    box-shadow: 0 0 15px rgba(255,183,71,.5), 0 5px 15px rgba(0,0,0,.5);
    animation: counter-spin 25s linear infinite;
  }

  @keyframes orbit-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes counter-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
  }

  .title{
    position:fixed;top:6%;left:50%;transform:translateX(-50%);
    width:92%;text-align:center;z-index:5;
    pointer-events:none;
  }
  .title h1{
    font-family:'Dancing Script',cursive;font-weight:700;
    font-size:clamp(28px,7.5vw,46px);color:var(--pink-soft);
    line-height:1.15;
    text-shadow:0 0 8px var(--pink-neon),0 0 20px rgba(255,111,176,.65),0 0 40px rgba(255,111,176,.35);
  }
  .title .tulip{
    display:inline-block;filter:drop-shadow(0 0 10px var(--tulip-pink));
    animation:sway 3s ease-in-out infinite;
  }
  @keyframes sway{0%,100%{transform:rotate(-6deg);}50%{transform:rotate(6deg);}}

  .decor-item{
    position:absolute;z-index:2;
    filter:drop-shadow(0 0 8px rgba(255,255,255,.25));
    animation:bob 5s ease-in-out infinite;
    user-select:none;
    pointer-events:none;
  }
  @keyframes bob{
    0%,100%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-14px) rotate(4deg);}
  }

  .msg{
    position:absolute;z-index:3;
    font-family:'Dancing Script',cursive;font-weight:600;
    color:var(--pink-soft);white-space:nowrap;pointer-events:none;
    text-shadow:0 0 6px var(--pink-neon),0 0 14px rgba(255,143,199,.6);
    font-size:clamp(14px,3.6vw,20px);
    opacity:0;
    animation:floatUp 6s ease-in forwards;
  }
  @keyframes floatUp{
    0%{opacity:0;transform:translateY(0) scale(.9);}
    12%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;transform:translateY(-170px) scale(1.05);}
  }
 
  .confetti{
    position:absolute;z-index:2;
    border-radius:2px;opacity:.85;
    pointer-events:none;
  }
  .confetti.falling {
    top:-10px;
    animation:fall linear infinite;
  }
  .confetti.burst {
    animation:explode ease-out forwards;
  }

  @keyframes fall{
    to{transform:translateY(115vh) translateX(var(--drift)) rotate(360deg);opacity:0;}
  }
  @keyframes explode {
    0% {transform: translate(0, 0) scale(1); opacity: 1;}
    100% {transform: translate(var(--burst-x), var(--burst-y)) rotate(270deg) scale(0.2); opacity: 0;}
  }

  .footer-credit{
    position:fixed;bottom:3%;left:50%;transform:translateX(-50%);
    z-index:5;font-size:12px;letter-spacing:.05em;color:rgba(255,255,255,.35);
    font-weight:300;pointer-events:none;
  }

  @media (prefers-reduced-motion: reduce){
    .ring-glow,.tulip,.decor-item,.confetti,.orbit-container,.foto-satelite{animation:none !important;}
  }
</style>
</head>
<body>

  <audio id="bg-music" src="musica/cancion.mp3" loop></audio>

  <canvas id="stars"></canvas>

  <div class="portal-wrap">
    <div class="ring-glow"></div>
    <div class="planet-dome"></div>
    
    <div class="orbit-container">
      <div class="satellite-holder" style="--angle: 0deg;">
        <img class="foto-satelite" src="imagenes/imag1.jpg" alt="Foto 1">
      </div>
      <div class="satellite-holder" style="--angle: 120deg;">
        <img class="foto-satelite" src="imagenes/imag2.jpg" alt="Foto 2">
      </div>
      <div class="satellite-holder" style="--angle: 240deg;">
        <img class="foto-satelite" src="imagenes/imag3.jpg" alt="Foto 3">
      </div>
    </div>
  </div>

  <div id="decor"></div>
  <div id="messages"></div>

  <header class="title">
    <h1>FELIZ<br><span class="cursive">CUMPLEAÑOS</span> MI ENANA <span class="tulip">🌷</span></h1>
  </header>

  <div class="footer-credit">hecho solo para mi enana </div>

<script>
const MENSAJES = [
  "Eres muy especial para mi",
  "no olvides que eres importante en mi vida",
  "siempre estare para ti",
  "Sonríe siempre",
  "Te quiero mucho minions",
  "Feliz Cumpleaños",
  "Un detalle especial para mi minions",
  "Mi minions favorito jajaja"
];
const DECOR_ICONS = ["🌷","🌷","🪐","🌍","🌷","✨","🌷","🪐"];
const colors = ['#ffffff','#ff9fd0','#ffd873','#ff6b6b'];

const music = document.getElementById('bg-music');

window.addEventListener('load', () => {
  music.play().catch(() => {
    console.log("El navegador bloqueó la reproducción automática. Esperando un clic.");
  });
});

const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
let meteors = [];

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  document.body.style.height = `${innerHeight}px`;

  stars = Array.from({length: 150}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5 + 0.4,
    phase: Math.random()*Math.PI*2,
    speed: Math.random()*0.02 + 0.008
  }));
}
window.addEventListener('resize', resize);
resize();

function createMeteor() {
  if (meteors.length < 5) {
    meteors.push({
      x: Math.random() * (canvas.width * 0.6),
      y: Math.random() * (canvas.height * 0.4),
      length: Math.random() * 80 + 40,
      speed: Math.random() * 4 + 5,
      width: Math.random() * 1.5 + 1,
      alpha: 1
    });
  }
}
setInterval(createMeteor, 600);

function drawSpace(t){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  for(const s of stars){
    const twinkle = 0.5 + 0.5*Math.sin(t*s.speed + s.phase);
    ctx.globalAlpha = 0.25 + twinkle*0.75;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  
  ctx.globalAlpha = 1;
  for (let i = meteors.length - 1; i >= 0; i--) {
    const m = meteors[i];
    let grad = ctx.createLinearGradient(m.x, m.y, m.x - m.length, m.y - m.length * 0.6);
    grad.addColorStop(0, 'rgba(255, 255, 255, ' + m.alpha + ')');
    grad.addColorStop(0.1, 'rgba(255, 216, 120, ' + m.alpha * 0.8 + ')');
    grad.addColorStop(0.6, 'rgba(255, 111, 176, ' + m.alpha * 0.2 + ')');
    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
    
    ctx.strokeStyle = grad;
    ctx.lineWidth = m.width;
    ctx.beginPath();
    ctx.moveTo(m.x, m.y);
    ctx.lineTo(m.x - m.length, m.y - m.length * 0.6);
    ctx.stroke();
    
    m.x += m.speed;
    m.y += m.speed * 0.6;
    
    if (m.x > canvas.width || m.y > canvas.height) {
      meteors.splice(i, 1);
    }
  }
  requestAnimationFrame(drawSpace);
}
requestAnimationFrame(drawSpace);

const decorWrap = document.getElementById('decor');
const decorZones = [
  {left:8,  top:22}, {left:82, top:20}, {left:5,  top:45},
  {left:88, top:48}, {left:15, top:78}, {left:78, top:80}
];
decorZones.forEach((pos, i)=>{
  const el = document.createElement('div');
  el.className = 'decor-item';
  el.textContent = DECOR_ICONS[i % DECOR_ICONS.length];
  el.style.left = pos.left + '%';
  el.style.top = pos.top + '%';
  el.style.fontSize = (16 + Math.random()*14) + 'px';
  el.style.animationDelay = (Math.random()*3) + 's';
  el.style.animationDuration = (4 + Math.random()*3) + 's';
  decorWrap.appendChild(el);
});

const msgWrap = document.getElementById('messages');
function spawnMessage(){
  const el = document.createElement('div');
  el.className = 'msg';
  el.textContent = MENSAJES[Math.floor(Math.random()*MENSAJES.length)];
  
  const side = Math.random() > 0.5 ? (6 + Math.random()*12) : (76 + Math.random()*12);
  el.style.left = side + '%';
  el.style.top  = (62 + Math.random()*20) + '%';
  
  msgWrap.appendChild(el);
  setTimeout(()=> el.remove(), 6200);
}
setInterval(spawnMessage, 1650);
spawnMessage();

function spawnConfetti(){
  const el = document.createElement('div');
  el.className = 'confetti falling';
  const size = 4 + Math.random()*5;
  el.style.width = size+'px';
  el.style.height = size+'px';
  el.style.left = Math.random()*100 + '%';
  el.style.background = colors[Math.floor(Math.random()*colors.length)];
  el.style.setProperty('--drift', (Math.random()*80-40)+'px');
  el.style.animationDuration = (6 + Math.random()*6) + 's';
  document.body.appendChild(el);
  setTimeout(()=> el.remove(), 13000);
}
setInterval(spawnConfetti, 280);
for(let i=0;i<12;i++) setTimeout(spawnConfetti, i*120);

window.addEventListener('click', (e) => {
  if (music.paused) {
    music.play().catch(err => console.log(err));
  }

  for(let i = 0; i < 10; i++) {
    const el = document.createElement('div');
    el.className = 'confetti burst';
    const size = 5 + Math.random()*6;
    el.style.width = size+'px';
    el.style.height = size+'px';
    el.style.left = e.clientX + 'px';
    el.style.top = e.clientY + 'px';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    
    const angle = Math.random() * Math.PI * 2;
    const distance = 40 + Math.random() * 90;
    el.style.setProperty('--burst-x', Math.cos(angle) * distance + 'px');
    el.style.setProperty('--burst-y', Math.sin(angle) * distance + 'px');
    
    el.style.animationDuration = (1.2 + Math.random()*1) + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }
});
</script>
</body>
</html>
